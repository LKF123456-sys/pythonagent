# 持续集成：lint（ruff）→ 类型检查（mypy）→ 测试（pytest）→ 前端构建
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # 后端：lint / 类型检查 / 测试
  # ============================================================
  backend:
    name: 后端（ruff + mypy + pytest）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports app/

      - name: Test (pytest)
        run: pytest tests/ -q

  # ============================================================
  # 前端：依赖安装 + 生产构建
  # ============================================================
  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b + vite build)
        run: npm run build
