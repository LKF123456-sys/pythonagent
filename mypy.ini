# mypy 配置：严格可空性 + 渐进式函数标注要求
[mypy]
python_version = 3.11

# 第三方库缺少类型存根时按 Any 处理（不报错）
ignore_missing_imports = True

# 不强制要求函数标注；未完整标注的函数体跳过检查
# （待注解覆盖率提升后可逐项开启 disallow_untyped_defs / check_untyped_defs）
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# 严格可空性检查：Optional[X] 必须显式判空，杜绝隐式 None 传播
strict_optional = True
no_implicit_optional = True

# 开启高价值告警
# （warn_return_any 暂不开：项目依赖 python-jose/tavily 等无类型存根库，
#   其返回值为 Any，会产生大量非本质噪音；待引入 stubs 后再开启）
warn_return_any = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = False

# 排除 vendored 依赖
exclude = (?x)(^libs/|^frontend/|^\.venv/|^scripts/)
