# Nginx 负载均衡配置：分发请求到多个后端实例

upstream backend {  # 定义后端服务器组
    # 轮询负载均衡，支持多实例
    server backend:8000;  # 后端服务1
    # 如需多实例，添加更多server行
    # server backend2:8000;
    # server backend3:8000;
}

upstream websocket_backend {  # WebSocket 专用负载均衡组
    # WebSocket需要ip_hash保证会话粘性
    ip_hash;  # 基于IP的会话粘性，确保同一客户端连接到同一后端
    server backend:8000;  # WebSocket后端服务
}

server {  # 定义HTTP服务器
    listen 80;  # 监听80端口
    server_name _;  # 匹配所有域名

    # 客户端上传文件大小限制
    client_max_body_size 50M;  # 最大请求体大小，支持文件上传

    # API v1 WebSocket 请求代理（必须放在普通 /api/ 代理之前，避免 Upgrade 头丢失）
    location ^~ /api/v1/ws/ {  # 匹配版本化后的 WebSocket 请求路径
        proxy_pass http://websocket_backend;  # 代理到 WebSocket 负载均衡组
        proxy_http_version 1.1;  # 使用 HTTP/1.1 才能支持 WebSocket 升级
        proxy_set_header Upgrade $http_upgrade;  # 传递 WebSocket 升级头
        proxy_set_header Connection "upgrade";  # 告诉后端当前连接需要升级为 WebSocket
        proxy_set_header Host $host;  # 传递 Host 头
        proxy_set_header X-Real-IP $remote_addr;  # 传递真实客户端 IP
        proxy_read_timeout 300s;  # WebSocket 读取超时 5 分钟
        proxy_send_timeout 300s;  # WebSocket 发送超时 5 分钟
    }

    # API 请求代理
    location /api/ {  # API请求路径
        proxy_pass http://backend;  # 代理到后端负载均衡组
        proxy_set_header Host $host;  # 传递Host头
        proxy_set_header X-Real-IP $remote_addr;  # 传递真实客户端IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 传递转发链
        proxy_set_header X-Forwarded-Proto $scheme;  # 传递协议
    }

    # 兼容旧版 WebSocket 请求代理
    location /ws/ {  # WebSocket请求路径
        proxy_pass http://websocket_backend;  # 代理到WebSocket负载均衡组
        proxy_http_version 1.1;  # 使用HTTP/1.1
        proxy_set_header Upgrade $http_upgrade;  # WebSocket升级头
        proxy_set_header Connection "upgrade";  # WebSocket连接升级
        proxy_set_header Host $host;  # 传递Host头
        proxy_set_header X-Real-IP $remote_addr;  # 传递真实IP
        proxy_read_timeout 300s;  # WebSocket读取超时5分钟
        proxy_send_timeout 300s;  # WebSocket发送超时5分钟
    }

    # 静态文件
    location / {  # 根路径
        proxy_pass http://backend;  # 代理到后端
        proxy_set_header Host $host;  # 传递Host头
        proxy_set_header X-Real-IP $remote_addr;  # 传递真实IP
    }
}
