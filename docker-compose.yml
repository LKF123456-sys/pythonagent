# 多智能体对话系统 - Docker Compose 编排
# 分布式部署：Nginx 负载均衡 + 多后端实例 + PostgreSQL（pgvector）+ Redis 缓存
# 后端（FastAPI）内嵌前端静态资源，通过 Nginx 反向代理对外提供服务
# Nginx 分发 HTTP API / WebSocket / 静态页面请求到多个后端实例

services:
  db:
    image: registry.cn-hangzhou.aliyuncs.com/jeecgdocker/pgvector:pg17
    container_name: agent-db
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent-local
      POSTGRES_DB: agent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis 缓存服务：用于多实例间共享会话状态、历史上下文缓存
  redis:
    image: redis:7-alpine  # 使用轻量级 Redis Alpine 镜像
    container_name: agent-redis  # 容器名称
    ports:
      - "6380:6379"  # 映射到主机6380端口，避免与本机Redis冲突
    volumes:
      - redisdata:/data  # Redis数据持久化卷
    command: redis-server --appendonly yes  # 启用 AOF 持久化，提升数据可靠性
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # 健康检查命令
      interval: 5s  # 检查间隔
      timeout: 3s  # 超时时间
      retries: 5  # 重试次数
    restart: unless-stopped  # 异常退出自动重启

  # 后端服务：FastAPI 应用，支持水平扩展多实例
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production  # 前端构建环境为生产模式
    # 支持水平扩展：通过 deploy.replicas 指定运行实例数
    deploy:
      replicas: 2  # 运行2个后端实例，nginx 会负载均衡
    # 不设置 container_name：多实例下固定名称会冲突
    depends_on:
      db:
        condition: service_healthy  # 等待数据库健康后再启动
      redis:
        condition: service_healthy  # 等待 Redis 健康后再启动
    # 敏感配置通过运行时注入（替代旧 Dockerfile 的 COPY .env，避免密钥进镜像）
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://agent:agent-local@db:5432/agent  # 数据库连接串
      - REDIS_URL=redis://redis:6379/0  # Redis 连接地址（db 0）
      - REDIS_ENABLED=true  # 启用 Redis 分布式缓存
      - WORKERS=4  # gunicorn worker 进程数
      - UPLOAD_FOLDER=/app/uploads  # 上传文件目录
      - LOG_FILE=/app/logs/app.log  # 日志文件路径
      - CORS_ORIGINS=http://localhost:8000,http://localhost:3000,http://localhost:5173,http://localhost  # 允许的跨域源
    volumes:
      - ./logs:/app/logs          # 日志持久化（多实例共享主机目录）
      - ./uploads:/app/uploads    # 上传文件持久化（多实例共享主机目录）
    restart: unless-stopped  # 异常退出自动重启
    # 深度健康检查：仅当 /api/health 聚合状态为 unhealthy 时判定不健康
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; r=httpx.get('http://localhost:8000/api/health',timeout=5); r.raise_for_status(); sys.exit(1 if r.json().get('status')=='unhealthy' else 0)"]
      interval: 30s  # 检查间隔30秒
      timeout: 10s  # 超时10秒
      retries: 3  # 重试3次
      start_period: 20s  # 启动后20秒开始检查

  # Nginx 负载均衡器：分发请求到多个后端实例
  nginx:
    image: nginx:alpine  # 使用轻量级 Nginx Alpine 镜像
    container_name: agent-nginx  # 容器名称
    ports:
      - "80:80"  # 对外暴露80端口，用户通过 http://localhost 访问
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # 挂载 nginx 配置（只读）
    depends_on:
      - backend  # 依赖后端服务
    restart: unless-stopped  # 异常退出自动重启

  # ============================================================
  # 监控服务：Prometheus 指标采集 + Grafana 可视化面板
  # ============================================================
  prometheus:  # Prometheus监控服务，负责采集和存储时序指标
    image: prom/prometheus:latest  # 使用Prometheus官方最新镜像
    ports:  # 端口映射配置
      - "9090:9090"  # 将容器内9090端口映射到宿主机9090端口，供外部访问Prometheus Web UI
    volumes:  # 卷挂载配置
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro  # 挂载Prometheus配置文件，只读模式
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro  # 挂载告警规则文件到rules目录，只读模式
      - prometheus-data:/prometheus  # 持久化Prometheus数据到命名卷
    restart: unless-stopped  # 容器异常退出时自动重启，除非手动停止

  grafana:  # Grafana可视化服务，负责展示监控面板
    image: grafana/grafana:latest  # 使用Grafana官方最新镜像
    ports:  # 端口映射配置
      - "3001:3000"  # 将容器内3000端口映射到宿主机3001端口，避免与本地开发服务冲突
    volumes:  # 卷挂载配置
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro  # 挂载数据源自动配置目录，只读模式
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro  # 挂载面板JSON配置目录，只读模式
      - grafana-data:/var/lib/grafana  # 持久化Grafana数据到命名卷
    environment:  # 环境变量配置
      - GF_SECURITY_ADMIN_PASSWORD=admin  # 设置Grafana管理员密码为admin
      - GF_USERS_ALLOW_SIGN_UP=false  # 禁止用户自行注册，仅管理员可创建账号
    restart: unless-stopped  # 容器异常退出时自动重启，除非手动停止

volumes:
  pgdata:
  redisdata:  # Redis 数据持久化卷
  prometheus-data:  # Prometheus 数据持久化卷，存储采集的时序指标
  grafana-data:  # Grafana 数据持久化卷，存储面板配置和用户数据
