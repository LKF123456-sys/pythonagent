# 多智能体对话系统 - Docker Compose 编排
# 后端（FastAPI）+ 前端（Nginx 托管 React 静态文件）

services:
  # ============================================================
  # 后端服务（FastAPI + uvicorn）
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: agent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/app.db
      - CHROMA_DB_PATH=/app/data/chroma_db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./data:/app/data          # SQLite + ChromaDB 持久化
      - ./logs:/app/logs          # 日志持久化
      - ./uploads:/app/uploads    # 上传文件持久化
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================
  # 前端服务（Nginx 托管 React 构建产物）
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
