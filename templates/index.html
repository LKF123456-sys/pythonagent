<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多智能体对话系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5; height: 100vh; display: flex; overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px; min-width: 280px; background: #1a1a2e; color: #fff;
            display: flex; flex-direction: column; transition: margin-left 0.3s;
        }
        .sidebar-header {
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header .logo { width: 32px; height: 32px; background: #4fc3f7;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #1a1a2e; font-size: 15px; }
        .sidebar-header .title { font-size: 15px; font-weight: 600; }
        .sidebar-actions { padding: 12px 16px; }
        .btn {
            width: 100%; padding: 10px 16px; border: none; border-radius: 8px;
            font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex;
            align-items: center; gap: 8px; justify-content: center;
        }
        .btn-new { background: #4fc3f7; color: #1a1a2e; font-weight: 600; }
        .btn-new:hover { background: #81d4fa; }
        .btn-clear { background: transparent; color: #ef5350; border: 1px solid #ef5350;
            margin-top: 8px; font-size: 12px; padding: 6px 12px; }
        .btn-clear:hover { background: #ef5350; color: #fff; }
        .btn-upload { background: rgba(255,255,255,0.08); color: #90a4ae;
            margin-top: 6px; font-size: 12px; padding: 6px 12px; }
        .btn-upload:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .btn-upload input[type="file"] { display: none; }

        .conversation-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .conv-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
            transition: background 0.15s; font-size: 13px; position: relative;
        }
        .conv-item:hover { background: rgba(255,255,255,0.08); }
        .conv-item.active { background: rgba(79,195,247,0.15); }
        .conv-item .conv-title {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .conv-item .conv-time { font-size: 10px; color: #78909c; white-space: nowrap; }
        .conv-item .conv-delete {
            display: none; position: absolute; right: 8px; background: #ef5350;
            color: #fff; border: none; border-radius: 4px; width: 20px; height: 20px;
            font-size: 11px; cursor: pointer; line-height: 20px; text-align: center;
        }
        .conv-item:hover .conv-delete { display: block; }
        .conv-item:hover .conv-time { visibility: hidden; }

        .sidebar-footer {
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px; color: #546e7a;
        }
        .docs-section { margin-top: 8px; }
        .docs-section .doc-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 0; font-size: 11px;
        }
        .docs-section .doc-delete {
            background: none; border: none; color: #ef5350; cursor: pointer; font-size: 12px;
        }

        /* 主区域 */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .main-header {
            background: #fff; padding: 12px 20px; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; gap: 12px;
        }
        .main-header .session-id { font-size: 12px; color: #90a4ae; }
        .main-header .spacer { flex: 1; }
        .main-header .toggle-sidebar {
            background: none; border: none; cursor: pointer; font-size: 18px; color: #546e7a;
        }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 14px; }
        .message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message.user .bubble { background: #1a73e8; color: #fff; border-radius: 16px 16px 4px 16px; }
        .message.assistant .bubble { background: #fff; color: #333;
            border-radius: 16px 16px 16px 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .avatar { width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; flex-shrink: 0; }
        .message.user .avatar { background: #1565c0; color: #fff; }
        .message.assistant .avatar { background: #e3f2fd; color: #1565c0; }
        .bubble { padding: 10px 14px; line-height: 1.6; font-size: 14px;
            white-space: pre-wrap; word-break: break-word; }
        .bubble img { max-width: 200px; border-radius: 8px; margin: 6px 0; cursor: pointer; }
        .status-msg { align-self: flex-start; display: flex; align-items: center;
            gap: 8px; color: #90a4ae; font-size: 13px; padding: 4px 0; }
        .status-msg .dot { width: 8px; height: 8px; border-radius: 50%;
            background: #ffa726; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .input-area { background: #fff; padding: 12px 20px; border-top: 1px solid #e0e0e0;
            display: flex; gap: 10px; align-items: flex-end; }
        .input-area .image-preview {
            position: relative; width: 60px; height: 60px; border-radius: 8px;
            overflow: hidden; border: 2px solid #e0e0e0; flex-shrink: 0;
        }
        .input-area .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .input-area .image-preview .remove-img {
            position: absolute; top: -4px; right: -4px; width: 18px; height: 18px;
            border-radius: 50%; background: #ef5350; color: #fff; border: none;
            font-size: 10px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; line-height: 1;
        }
        .input-area textarea {
            flex: 1; border: 1px solid #d0d5dd; border-radius: 12px; padding: 10px 14px;
            font-size: 14px; font-family: inherit; resize: none; outline: none;
            max-height: 100px; line-height: 1.5; transition: border-color 0.2s;
        }
        .input-area textarea:focus { border-color: #1a73e8; }
        .input-area .btn-send {
            width: 44px; height: 44px; border: none; border-radius: 12px;
            background: #1a73e8; color: #fff; font-size: 18px; cursor: pointer;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .input-area .btn-send:hover { background: #1565c0; }
        .input-area .btn-send:disabled { background: #b0bec5; cursor: not-allowed; }
        .input-area .btn-img {
            width: 44px; height: 44px; border: 1px dashed #d0d5dd; border-radius: 12px;
            background: #fafafa; cursor: pointer; flex-shrink: 0; display: flex;
            align-items: center; justify-content: center; font-size: 20px; color: #90a4ae;
            transition: all 0.2s; position: relative;
        }
        .input-area .btn-img:hover { border-color: #1a73e8; color: #1a73e8; }
        .input-area .btn-img input { display: none; }

        .chat-container::-webkit-scrollbar, .conversation-list::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb, .conversation-list::-webkit-scrollbar-thumb {
            background: #c0c0c0; border-radius: 3px;
        }

        /* 登录遮罩 */
        .login-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            background: #fff; border-radius: 16px; padding: 32px;
            width: 380px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .login-box h2 { margin-bottom: 20px; text-align: center; color: #1a1a2e; }
        .login-box .field { margin-bottom: 14px; }
        .login-box .field label { display: block; font-size: 13px; color: #546e7a; margin-bottom: 4px; }
        .login-box .field input {
            width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd;
            border-radius: 8px; font-size: 14px; outline: none;
        }
        .login-box .field input:focus { border-color: #1a73e8; }
        .login-box .btn-login {
            width: 100%; padding: 12px; background: #1a73e8; color: #fff;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
            margin-top: 6px;
        }
        .login-box .btn-login:hover { background: #1565c0; }
        .login-box .switch {
            text-align: center; margin-top: 12px; font-size: 13px; color: #546e7a;
        }
        .login-box .switch a { color: #1a73e8; cursor: pointer; text-decoration: none; }
        .login-box .error-msg { color: #ef5350; font-size: 13px; margin-top: 8px; text-align: center; }
        .logout-btn {
            background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
            padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
            margin-left: 8px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
                margin-left: -280px; }
            .sidebar.open { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- 登录遮罩 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 id="loginTitle">登录</h2>
            <div class="field">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="field">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')handleLogin()">
            </div>
            <div class="error-msg" id="loginError"></div>
            <button class="btn-login" id="loginBtn" onclick="handleLogin()">登 录</button>
            <div class="switch">
                <span id="switchText">没有账号？</span>
                <a id="switchLink" onclick="toggleLoginMode()">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">AI</div>
            <span class="title">多智能体系统</span>
            <button class="logout-btn" onclick="logout()" title="退出登录">退出</button>
        </div>
        <div class="sidebar-actions">
            <button class="btn btn-new" onclick="newSession()">+ 新对话</button>
            <button class="btn btn-clear" onclick="clearCurrentChat()">清空当前对话</button>
            <label class="btn btn-upload" title="上传文档到RAG知识库">
                📄 上传文档(RAG)
                <input type="file" accept=".txt,.md,.csv,.json,.pdf" onchange="uploadDocument(this)">
            </label>
        </div>
        <div class="conversation-list" id="convList"></div>
        <div class="sidebar-footer">
            <div>会话: <span id="sidebarSessionId">---</span></div>
            <div class="docs-section" id="docsSection">
                <div style="margin-top:6px;color:#78909c;">RAG文档库:</div>
            </div>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="main">
        <div class="main-header">
            <button class="toggle-sidebar" onclick="toggleSidebar()" title="侧边栏">☰</button>
            <span style="font-weight:600;">对话</span>
            <span class="spacer"></span>
            <span class="session-id" id="mainSessionId">会话: ---</span>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="avatar">AI</div>
                <div class="bubble">你好！我是多智能体助手。<br>
功能：联网搜索 | 图片识别(Ollama) | 文档检索(RAG) | 长期记忆</div>
            </div>
        </div>
        <div class="input-area">
            <label class="btn-img" title="上传图片">
                📷
                <input type="file" accept="image/*" id="imageInput" onchange="previewImage(this)">
            </label>
            <div class="image-preview" id="imagePreview" style="display:none;">
                <img id="previewImg" src="" alt="预览">
                <button class="remove-img" onclick="removeImage()">✕</button>
            </div>
            <textarea id="userInput" rows="1" placeholder="输入问题，Enter发送..."
                onkeydown="handleKeyDown(event)"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById("chatContainer");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const convList = document.getElementById("convList");
        const sidebar = document.getElementById("sidebar");

        let currentSessionId = null;
        let isWaiting = false;
        let uploadedImageFile = null;
        let isFirstTurn = true;

        // ========== 认证相关 ==========
        let authToken = localStorage.getItem("auth_token") || "";
        let isLoginMode = true;

        // 统一的 API 请求方法，自动携带 token
        async function apiFetch(url, options = {}) {
            const headers = { ...(options.headers || {}) };
            if (authToken) {
                headers["Authorization"] = "Bearer " + authToken;
            }
            if (!(options.body instanceof FormData)) {
                headers["Content-Type"] = "application/json";
            }
            const resp = await fetch(url, { ...options, headers });
            if (resp.status === 401) {
                localStorage.removeItem("auth_token");
                authToken = "";
                showLogin();
                throw new Error("登录已过期，请重新登录");
            }
            return resp;
        }

        function showLogin() {
            document.getElementById("loginOverlay").classList.remove("hidden");
        }
        function hideLogin() {
            document.getElementById("loginOverlay").classList.add("hidden");
        }

        function toggleLoginMode() {
            isLoginMode = !isLoginMode;
            document.getElementById("loginTitle").textContent = isLoginMode ? "登录" : "注册";
            document.getElementById("loginBtn").textContent = isLoginMode ? "登 录" : "注 册";
            document.getElementById("switchText").textContent = isLoginMode ? "没有账号？" : "已有账号？";
            document.getElementById("switchLink").textContent = isLoginMode ? "立即注册" : "去登录";
            document.getElementById("loginError").textContent = "";
        }

        async function handleLogin() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const errorEl = document.getElementById("loginError");
            errorEl.textContent = "";

            if (!username || !password) {
                errorEl.textContent = "请输入用户名和密码";
                return;
            }

            const url = isLoginMode ? "/api/auth/login" : "/api/auth/register";
            try {
                const resp = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    errorEl.textContent = data.detail || "操作失败";
                    return;
                }
                authToken = data.access_token;
                localStorage.setItem("auth_token", authToken);
                hideLogin();
                init();
            } catch (e) {
                errorEl.textContent = "网络错误: " + e.message;
            }
        }

        function logout() {
            localStorage.removeItem("auth_token");
            authToken = "";
            currentSessionId = null;
            chatContainer.innerHTML = "";
            convList.innerHTML = "";
            showLogin();
        }

        // 如果已有 token，检查是否有效
        async function checkAuth() {
            if (!authToken) { showLogin(); return; }
            try {
                const resp = await apiFetch("/api/auth/me");
                if (!resp.ok) throw new Error("invalid");
                hideLogin();
                init();
            } catch (e) {
                showLogin();
            }
        }

        // 初始化
        async function init() {
            const resp = await apiFetch("/api/session");
            const data = await resp.json();
            currentSessionId = data.session_id;
            updateSessionUI();
            loadConversations();
            loadDocuments();
        }
        function updateSessionUI() {
            document.getElementById("sidebarSessionId").textContent = currentSessionId;
            document.getElementById("mainSessionId").textContent = "会话: " + currentSessionId;
        }

        // 侧边栏切换
        function toggleSidebar() { sidebar.classList.toggle("open"); }

        // 新会话
        async function newSession() {
            if (isWaiting) return;
            const resp = await apiFetch("/api/session/new", { method: "POST" });
            const data = await resp.json();
            currentSessionId = data.session_id;
            updateSessionUI();
            chatContainer.innerHTML = "";
            addMessage("assistant", "新对话已开始！（会话: " + currentSessionId + "）");
            isFirstTurn = true;
            removeImage();
            loadConversations();
        }

        // 清空当前对话
        function clearCurrentChat() {
            if (isWaiting) return;
            chatContainer.innerHTML = "";
            addMessage("assistant", "对话已清空。");
            isFirstTurn = true;
            removeImage();
        }

        // 加载历史对话列表
        async function loadConversations() {
            try {
                const resp = await apiFetch("/api/conversations");
                const data = await resp.json();
                convList.innerHTML = "";
                data.conversations.forEach(conv => {
                    const div = document.createElement("div");
                    div.className = "conv-item" + (conv.session_id === currentSessionId ? " active" : "");
                    div.innerHTML = `
                        <span class="conv-title" title="${conv.title}">${conv.title || "未命名"}</span>
                        <span class="conv-time">${conv.updated_at?.slice(0,10) || ""}</span>
                        <button class="conv-delete" onclick="event.stopPropagation();deleteConv('${conv.session_id}')">✕</button>
                    `;
                    div.onclick = () => switchConversation(conv.session_id);
                    convList.appendChild(div);
                });
            } catch(e) {}
        }

        // 切换对话
        function switchConversation(sid) {
            currentSessionId = sid;
            updateSessionUI();
            chatContainer.innerHTML = "";
            addMessage("assistant", "已切换到会话: " + sid + "\n（对话历史从服务器加载）");
            isFirstTurn = false;
            loadConversations();
        }

        // 删除对话
        async function deleteConv(sid) {
            await apiFetch("/api/conversations/" + sid, { method: "DELETE" });
            if (sid === currentSessionId) newSession();
            loadConversations();
        }

        // 加载RAG文档列表
        async function loadDocuments() {
            try {
                const resp = await apiFetch("/api/documents");
                const data = await resp.json();
                const section = document.getElementById("docsSection");
                section.innerHTML = '<div style="margin-top:6px;color:#78909c;">RAG文档库:</div>';
                data.documents.forEach(doc => {
                    const div = document.createElement("div");
                    div.className = "doc-item";
                    div.innerHTML = `<span>📄 ${doc.filename} (${doc.chunks}块)</span>
                        <button class="doc-delete" onclick="deleteDoc('${doc.filename}')">✕</button>`;
                    section.appendChild(div);
                });
                if (data.documents.length === 0) {
                    section.innerHTML += '<div style="font-size:10px;color:#546e7a;">暂无文档</div>';
                }
            } catch(e) {}
        }
        async function deleteDoc(fname) {
            await apiFetch("/api/documents/" + fname, { method: "DELETE" });
            loadDocuments();
        }

        // 上传文档到RAG
        async function uploadDocument(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append("document", file);
            try {
                const resp = await apiFetch("/api/upload/document", { method: "POST", body: formData });
                const data = await resp.json();
                if (data.error) { alert("上传失败: " + data.error); }
                else { addMessage("assistant", `文档 "${data.filename}" 已上传到RAG知识库 (${data.chunks}个片段)。`); }
                loadDocuments();
            } catch(e) { alert("上传失败: " + e); }
            input.value = "";
        }

        // 图片预览
        function previewImage(input) {
            const file = input.files[0];
            if (!file) return;
            uploadedImageFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById("previewImg").src = e.target.result;
                document.getElementById("imagePreview").style.display = "block";
            };
            reader.readAsDataURL(file);
        }
        function removeImage() {
            uploadedImageFile = null;
            document.getElementById("imagePreview").style.display = "none";
            document.getElementById("imageInput").value = "";
        }

        // 键盘事件
        function handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        // 发送消息（使用 SSE 流式响应）
        async function sendMessage() {
            if (isWaiting) return;
            const question = userInput.value.trim();
            if (!question) return;

            // 添加用户消息
            let userBubble = question;
            if (uploadedImageFile) {
                userBubble = "[图片] " + question;
            }
            addMessage("user", userBubble);
            userInput.value = "";
            userInput.style.height = "auto";
            userInput.focus();

            isWaiting = true;
            sendBtn.disabled = true;
            const statusEl = addStatus("正在处理中...");

            // 创建 AI 回复气泡（流式填充）
            const aiBubble = addMessage("assistant", "");
            let fullText = "";
            let currentNode = "";

            try {
                let bodyData;
                if (uploadedImageFile) {
                    // 有图片时：先上传图片，再用 JSON 请求流式接口
                    const formData = new FormData();
                    formData.append("image", uploadedImageFile);
                    const uploadResp = await apiFetch("/api/upload/image", { method: "POST", body: formData });
                    const uploadData = await uploadResp.json();
                    if (uploadData.error) throw new Error(uploadData.error);
                    bodyData = {
                        question, session_id: currentSessionId,
                        is_first_turn: isFirstTurn,
                        image_filename: uploadData.filename,
                    };
                } else {
                    bodyData = {
                        question, session_id: currentSessionId,
                        is_first_turn: isFirstTurn,
                    };
                }

                // 使用 SSE 流式接口
                const response = await apiFetch("/api/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyData),
                });

                statusEl.remove();
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // 保留未完成的行

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const evt = JSON.parse(line.slice(6));
                            if (evt.type === "token") {
                                fullText += evt.content;
                                aiBubble.textContent = fullText;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } else if (evt.type === "status") {
                                currentNode = evt.node;
                                statusEl.textContent = `处理中: ${evt.node}...`;
                            } else if (evt.type === "error") {
                                aiBubble.textContent = "错误: " + evt.error;
                            }
                        } catch (parseErr) { /* 忽略解析错误 */ }
                    }
                }

                if (!fullText) {
                    aiBubble.textContent = "（未收到回复）";
                }
                isFirstTurn = false;
                removeImage();
                loadConversations();
            } catch(err) {
                statusEl.remove();
                aiBubble.textContent = "网络请求失败，请检查服务。";
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, text) {
            const div = document.createElement("div");
            div.className = "message " + role;
            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = role === "user" ? "我" : "AI";
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;
            div.appendChild(avatar);
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return bubble; // 返回 bubble 元素，供流式填充使用
        }
        function addStatus(text) {
            const div = document.createElement("div");
            div.className = "status-msg";
            div.innerHTML = '<span class="dot"></span>' + text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }
        userInput.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 100) + "px";
        });
        checkAuth();
        userInput.focus();
    </script>
</body>
</html>
