# 测试专用 Docker Compose：独立的 PostgreSQL（pgvector）实例
# 使用 5433 端口避免与开发数据库冲突
#
# 用法：
#   docker compose -f docker-compose.test.yml up -d
#   export DATABASE_URL=postgresql://agent:agent-local@localhost:5433/agent_test
#   pytest
#   docker compose -f docker-compose.test.yml down

services:
  test_db:
    image: pgvector/pgvector:pg16
    container_name: agent-test-db
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent-local
      POSTGRES_DB: agent_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 3s
      timeout: 2s
      retries: 5
